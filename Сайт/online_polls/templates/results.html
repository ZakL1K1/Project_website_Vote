{% extends "base.html" %}

{% block content %}

<h2>📊 Результаты: {{ poll[0] }}</h2>

<canvas id="chart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ labels | tojson }},
        datasets: [{
            label: 'Голоса',
            data: {{ values | tojson }},
            borderWidth: 1
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

<br>
<a href="/dashboard">← Назад</a>

{% endblock %}
