{% extends "base.html" %}

{% block content %}

<h2>📋 Личный кабинет</h2>

{% if polls %}
<div style="display: flex; flex-wrap: wrap; gap: 15px;">

    {% for poll in polls %}
    <div style="
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 15px;
        width: 280px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    ">

        <h3>{{ poll[1] }}</h3>

        <p>ID: {{ poll[0] }}</p>

        <a href="/poll/{{ poll[0] }}">🗳 Открыть</a><br><br>
        <a href="/results/{{ poll[0] }}">📊 Результаты</a><br><br>

        <input type="text"
               value="http://127.0.0.1:5000/poll/{{ poll[0] }}"
               readonly
               style="width: 100%;">

        <button onclick="navigator.clipboard.writeText(this.previousElementSibling.value)"
                style="margin-top: 5px;">
            📋 Копировать ссылку
        </button>

    </div>
    {% endfor %}

</div>

{% else %}
<p>У вас пока нет опросов</p>
{% endif %}

<br>
<a href="/create_poll">➕ Создать опрос</a>

{% endblock %}
